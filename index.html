<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f0f11;
  --bg2: #17171a;
  --bg3: #1e1e22;
  --bg4: #26262b;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f0;
  --text2: #a0a0a8;
  --text3: #606068;
  --accent: #7c6af7;
  --accent2: #9d8ff9;
  --accent-bg: rgba(124,106,247,0.12);
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.1);
  --radius: 12px;
  --radius-sm: 8px;
  --sidebar: 220px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; font-size: 14px; }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar); min-height: 100vh; background: var(--bg2);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; z-index: 100;
}
.logo { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); }
.logo-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
.logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
.nav { padding: 12px 8px; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 10px;
  border-radius: var(--radius-sm); cursor: pointer; color: var(--text2);
  font-size: 13px; font-weight: 400; transition: all 0.15s; margin-bottom: 2px;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-bg); color: var(--accent2); font-weight: 500; }
.nav-icon { width: 18px; text-align: center; font-size: 16px; flex-shrink: 0; }
.sidebar-bottom { padding: 12px 8px; border-top: 1px solid var(--border); }
.sync-badge { font-size: 11px; color: var(--text3); padding: 6px 10px; font-family: var(--mono); }

/* MAIN */
#main { margin-left: var(--sidebar); flex: 1; min-height: 100vh; }
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar-title { font-size: 15px; font-weight: 500; }
.topbar-right { display: flex; gap: 8px; align-items: center; }
.btn {
  border: 1px solid var(--border2); background: var(--bg3); color: var(--text);
  padding: 7px 14px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px;
  font-family: var(--font); font-weight: 400; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--bg4); border-color: var(--border2); }
.btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent2); }
.content { padding: 24px; }

/* CARDS */
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; margin-bottom: 24px; }
.metric-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 18px;
}
.metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-family: var(--mono); }
.metric-value { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.metric-green { color: var(--green); }
.metric-red { color: var(--red); }
.metric-amber { color: var(--amber); }

.card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 16px;
}
.card-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 13px; font-weight: 500; }
.card-body { padding: 16px 18px; }

/* TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 12px; font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); font-family: var(--mono); }
td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text2); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }
.td-concepto { color: var(--text); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; font-family: var(--mono);
}
.badge-retiro { background: var(--red-bg); color: var(--red); }
.badge-deposito { background: var(--green-bg); color: var(--green); }
.badge-grupo { background: var(--accent-bg); color: var(--accent2); }
.amount-retiro { color: var(--red); font-family: var(--mono); font-size: 13px; }
.amount-deposito { color: var(--green); font-family: var(--mono); font-size: 13px; }

/* FILTERS */
.filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
.filter-select, .filter-input {
  background: var(--bg2); border: 1px solid var(--border2); color: var(--text);
  padding: 7px 12px; border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font);
  outline: none;
}
.filter-select:focus, .filter-input:focus { border-color: var(--accent); }
.filter-input { flex: 1; min-width: 180px; }

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 12px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.05em; }
.form-control {
  background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
  padding: 9px 12px; border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font);
  outline: none; transition: border 0.15s;
}
.form-control:focus { border-color: var(--accent); }
select.form-control option { background: var(--bg3); }

/* CHARTS */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.chart-wrap { position: relative; }

/* PASIVOS */
.pasivo-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.pasivo-row:last-child { border-bottom: none; }
.pasivo-name { flex: 1; font-weight: 500; font-size: 13px; }
.pasivo-detail { font-size: 11px; color: var(--text3); margin-top: 2px; }
.pasivo-amount { text-align: right; font-family: var(--mono); }
.pasivo-pago { font-size: 12px; color: var(--text3); }
.progress-bar { height: 4px; background: var(--bg4); border-radius: 2px; margin-top: 6px; width: 100%; }
.progress-fill { height: 4px; border-radius: 2px; background: var(--accent); }

/* MODAL */
#modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 200; align-items: center; justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal {
  background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius);
  width: 90%; max-width: 520px; padding: 24px; position: relative;
}
.modal-title { font-size: 15px; font-weight: 600; margin-bottom: 20px; }
.modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; }

/* IMPORT */
.drop-zone {
  border: 2px dashed var(--border2); border-radius: var(--radius); padding: 32px;
  text-align: center; cursor: pointer; color: var(--text3); transition: all 0.15s;
}
.drop-zone:hover { border-color: var(--accent); color: var(--text); background: var(--accent-bg); }

/* PAGINATION */
.pagination { display: flex; align-items: center; gap: 8px; padding: 12px 18px; border-top: 1px solid var(--border); }
.page-info { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.page-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.page-btn:hover { background: var(--bg4); }
.page-btn:disabled { opacity: 0.3; cursor: default; }

/* SUBS LIST */
.sub-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.sub-item:last-child { border-bottom: none; }
.sub-name { font-size: 13px; }
.sub-amount { font-family: var(--mono); font-size: 13px; color: var(--amber); }

/* RESPONSIVE */
@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); transition: transform 0.2s; }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; }
  .charts-grid { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: 1fr 1fr; }
  #menu-btn { display: flex !important; }
}
#menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }

/* TC TABLE */
.tc-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.tc-table th { text-align: right; padding: 9px 14px; font-size: 10px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); font-family: var(--mono); white-space: nowrap; }
.tc-table th:first-child { text-align: left; }
.tc-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); text-align: right; font-family: var(--mono); font-size: 12px; color: var(--text2); vertical-align: middle; }
.tc-table td:first-child { text-align: left; font-family: var(--font); font-size: 13px; color: var(--text); font-weight: 500; }
.tc-table tr:last-child td { border-bottom: none; }
.tc-table tr:hover td { background: var(--bg3); }
.semaforo { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-family: var(--font); padding: 2px 8px; border-radius: 99px; font-weight: 500; }
.uso-bar { height: 3px; border-radius: 2px; background: var(--bg4); margin-top: 4px; }
.uso-fill { height: 3px; border-radius: 2px; }
.tc-total-row td { color: var(--text); font-weight: 600; border-top: 1px solid var(--border2); background: var(--bg3); }
.tc-total-row td:first-child { font-family: var(--font); }

.empty-state { text-align: center; padding: 48px; color: var(--text3); font-size: 14px; }
.tab-row { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.tab { padding: 7px 16px; border-radius: 99px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--text3); font-family: var(--font); transition: all 0.15s; }
.tab.active { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent); }
.alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 8px; display: flex; gap: 8px; }
.alert-warn { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.alert-info { background: var(--accent-bg); color: var(--accent2); border: 1px solid rgba(124,106,247,0.2); }
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
// ==================== DATA ====================
// Suppress PDF.js warnings (expected in sandboxed/local contexts)
const _cw = console.warn.bind(console);
console.warn = (...a) => {
  if (typeof a[0] === 'string' && (a[0].includes('fake worker') || a[0].includes('workerSrc') || a[0].includes('Deprecated'))) return;
  _cw(...a);
};

const STORAGE_KEY = 'finanzas_v1';
const DATA_VERSION = 8;
let appData = loadData();

function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const parsed = JSON.parse(s);
      if (!parsed.dataVersion || parsed.dataVersion < DATA_VERSION) {
        const savedIds = new Set(parsed.movimientos.map(m => m.id));
        const newMovs = getInitialData().filter(m => !savedIds.has(m.id));
        if (newMovs.length > 0) parsed.movimientos = [...parsed.movimientos, ...newMovs];
        parsed.dataVersion = DATA_VERSION;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
      }
      return parsed;
    }
  } catch(e) {}
  return { movimientos: getInitialData(), pasivos: getInitialPasivos(), nextId: 10000, dataVersion: DATA_VERSION };
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
  document.getElementById('sync-info').textContent = appData.movimientos.length + ' movimientos';
}

function getDiasParaCorte(diaCorte) {
  const hoy = new Date();
  const diaHoy = hoy.getDate();
  let diff = diaCorte - diaHoy;
  if (diff < 0) diff += 30;
  return diff;
}

function getDiasParaPago(diaPago) {
  const hoy = new Date();
  const diaHoy = hoy.getDate();
  let diff = diaPago - diaHoy;
  if (diff < 0) diff += 30;
  return diff;
}

function getEstadoSemaforo(diasPago) {
  if (diasPago <= 3) return { color: 'var(--red)', label: 'URGENTE' };
  if (diasPago <= 7) return { color: 'var(--amber)', label: 'PRÓXIMO' };
  return { color: 'var(--green)', label: 'AL DÍA' };
}

// ==================== HELPERS ====================
const fmt = n => '$' + Math.abs(n).toLocaleString('es-MX', {minimumFractionDigits:0, maximumFractionDigits:0});
const fmtDec = n => '$' + Math.abs(n).toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});

function groupBy(arr, key) {
  return arr.reduce((acc, item) => {
    const k = item[key] || 'Sin clasificar';
    acc[k] = (acc[k] || 0) + item.monto;
    return acc;
  }, {});
}

function retiros() { return appData.movimientos.filter(m => m.tipo === 'RETIRO'); }
function depositos() { return appData.movimientos.filter(m => m.tipo === 'DEPOSITO'); }
function sinTraspasos() { return retiros().filter(m => !['TRASPASO ENTRE CUENTAS','TRANSFERENCIA CUENTAS','Traspaso entre cuentas'].includes(m.grupo)); }

const pages = {
  dashboard: renderDashboard,
  movimientos: renderMovimientos,
  gastos: renderGastos,
  pasivos: renderPasivos,
  suscripciones: renderSuscripciones,
  captura: renderCaptura,
  importar: renderImportar,
  estados: renderEstados,
};

let currentPage = 'dashboard';
let movPage = 1;
const PER_PAGE = 50;
let movFilters = { search:'', grupo:'', banco:'', tipo:'' };

function showPage(name) {
  currentPage = name;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.textContent.trim().includes(name === 'dashboard' ? 'Dashboard' : name === 'movimientos' ? 'Movimientos' : name === 'gastos' ? 'Análisis' : name === 'pasivos' ? 'Pasivos' : name === 'suscripciones' ? 'Suscripciones' : name === 'captura' ? 'Captura' : 'Importar')) {
      el.classList.add('active');
    }
  });
  const titles = { dashboard:'Dashboard', movimientos:'Movimientos', gastos:'Análisis de Gastos', pasivos:'Pasivos', suscripciones:'Suscripciones Digitales', captura:'Captura Rápida', importar:'Importar Estado de Cuenta', estados:'Control de Estados de Cuenta' };
  document.getElementById('page-title').textContent = titles[name] || name;
  if (window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
  renderPage();
}

function renderPage() {
  const fn = pages[currentPage];
  if (fn) document.getElementById('content').innerHTML = fn();
  bindPageEvents();
}

function bindPageEvents() {
  // Filter events for movimientos
  const s = document.getElementById('filter-search');
  const g = document.getElementById('filter-grupo');
  const b = document.getElementById('filter-banco');
  const t = document.getElementById('filter-tipo');
  if (s) s.addEventListener('input', e => { movFilters.search = e.target.value; movPage = 1; renderMovTable(); });
  if (g) g.addEventListener('change', e => { movFilters.grupo = e.target.value; movPage = 1; renderMovTable(); });
  if (b) b.addEventListener('change', e => { movFilters.banco = e.target.value; movPage = 1; renderMovTable(); });
  if (t) t.addEventListener('change', e => { movFilters.tipo = e.target.value; movPage = 1; renderMovTable(); });
  renderCharts();
}

    </select>
    <select class="filter-select" id="filter-grupo">
      <option value="">Todos los grupos</option>
      ${grupos.map(g=>`<option value="${g}" ${movFilters.grupo===g?'selected':''}>${g}</option>`).join('')}
    </select>
    <select class="filter-select" id="filter-banco">

  </div>
  <div class="card" id="mov-table-card"></div>`;
}

function getFilteredMovs() {
  return appData.movimientos.filter(m => {
    if (movFilters.tipo && m.tipo !== movFilters.tipo) return false;
    if (movFilters.grupo && m.grupo !== movFilters.grupo) return false;
    if (movFilters.banco && m.banco !== movFilters.banco) return false;
    if (movFilters.search) {
      const q = movFilters.search.toLowerCase();
      if (!((m.concepto||'').toLowerCase().includes(q) || (m.subgrupo||'').toLowerCase().includes(q))) return false;
    }
    return true;
  }).sort((a,b) => b.fecha.localeCompare(a.fecha));
}

function renderMovTable() {
  const card = document.getElementById('mov-table-card');
  if (!card) return;
  const filtered = getFilteredMovs();
  const total = filtered.length;
  const pages = Math.ceil(total / PER_PAGE);
  const slice = filtered.slice((movPage-1)*PER_PAGE, movPage*PER_PAGE);
  const sumRet = filtered.filter(m=>m.tipo==='RETIRO').reduce((s,m)=>s+m.monto,0);
  const sumDep = filtered.filter(m=>m.tipo==='DEPOSITO').reduce((s,m)=>s+m.monto,0);

  card.innerHTML = `
  <div class="card-header">
    <span class="card-title">${total} movimientos</span>
    <span style="font-size:12px;color:var(--text3);font-family:var(--mono);">
      <span style="color:var(--green)">+${fmt(sumDep)}</span> / <span style="color:var(--red)">-${fmt(sumRet)}</span>
    </span>
  </div>
  <div class="table-wrap">
  <table>
    <thead><tr>
      <th>Fecha</th><th>Concepto</th><th>Banco</th><th>Tipo</th><th>Grupo</th><th>Subgrupo</th><th style="text-align:right">Monto</th>
    </tr></thead>
    <tbody>
    ${slice.length ? slice.map(m => `
      <tr>
        <td style="font-family:var(--mono);font-size:12px;white-space:nowrap">${m.fecha}</td>
        <td class="td-concepto">${m.concepto||''}</td>
        <td style="font-size:12px;font-family:var(--mono)">${m.banco||''}</td>
        <td><span class="badge badge-${m.tipo.toLowerCase()}">${m.tipo}</span></td>
        <td style="font-size:12px">${m.grupo||''}</td>
        <td style="font-size:12px;color:var(--text2)">${m.subgrupo||''}</td>
        <td style="text-align:right"><span class="amount-${m.tipo.toLowerCase()}">${m.tipo==='RETIRO'?'-':'+'} ${fmtDec(m.monto)}</span></td>
      </tr>`).join('') : '<tr><td colspan="7" class="empty-state">Sin resultados</td></tr>'}
    </tbody>
  </table>
  </div>
  <div class="pagination">
    <button class="page-btn" onclick="movPage=${movPage-1};renderMovTable()" ${movPage<=1?'disabled':''}>← Ant</button>

  </div>
  <div id="analisis-content"></div>`;
}

function renderAnalisisMes(mes) {
  let movs = appData.movimientos;
  if (mes !== 'all') movs = movs.filter(m => m.fecha.startsWith(mes));
  const ret = movs.filter(m=>m.tipo==='RETIRO');
  const dep = movs.filter(m=>m.tipo==='DEPOSITO');
  const byGrupo = groupBy(ret.filter(m=>!['TRASPASO ENTRE CUENTAS','TRANSFERENCIA CUENTAS'].includes(m.grupo)), 'grupo');
  const bySub = groupBy(ret.filter(m=>m.grupo==='GASTOS VARIABLES'), 'subgrupo');
  const topSubs = Object.entries(bySub).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const ingresos = dep.reduce((s,m)=>s+m.monto,0);
  const gastoReal = Object.values(byGrupo).reduce((s,v)=>s+v,0);
  const div = document.getElementById('analisis-content');
  if (!div) return;
  div.innerHTML = `
  <div class="metrics" style="margin-bottom:16px">
    <div class="metric-card"><div class="metric-label">Ingresos</div><div class="metric-value metric-green">${fmt(ingresos)}</div></div>
    <div class="metric-card"><div class="metric-label">Gasto real</div><div class="metric-value metric-red">${fmt(gastoReal)}</div></div>
    <div class="metric-card"><div class="metric-label">Diferencia</div><div class="metric-value ${ingresos-gastoReal>=0?'metric-green':'metric-red'}">${ingresos-gastoReal>=0?'+':'-'}${fmt(ingresos-gastoReal)}</div></div>
  </div>
  <div class="charts-grid">
    <div class="card">
      <div class="card-header"><span class="card-title">Por grupo</span></div>
      <div class="card-body"><div class="chart-wrap" style="height:280px"><canvas id="chart-an-grupos"></canvas></div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Gastos variables — detalle</span></div>
      <div class="card-body">
        ${topSubs.map(([k,v])=>`
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
            <span style="color:var(--text2)">${k}</span>
            <span style="font-family:var(--mono);color:var(--red)">${fmt(v)}</span>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
  // draw chart
  setTimeout(() => {
    const ctx = document.getElementById('chart-an-grupos');
    if (!ctx) return;
    const entries = Object.entries(byGrupo).sort((a,b)=>b[1]-a[1]);
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: entries.map(e=>e[0]),
        datasets: [{ data: entries.map(e=>e[1]), backgroundColor: '#7c6af755', borderColor: '#7c6af7', borderWidth: 1 }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ x:{ ticks:{color:'#a0a0a8',font:{size:10},maxRotation:45} }, y:{ ticks:{color:'#a0a0a8',callback:v=>'$'+Math.round(v/1000)+'K'} } } }
    });
  }, 50);
}

function toggleEstado(cuentaId, mesKey, el) {
  if (!appData.estados) appData.estados = {};
  if (!appData.estados[cuentaId]) appData.estados[cuentaId] = {};
  const actual = appData.estados[cuentaId][mesKey];
  appData.estados[cuentaId][mesKey] = actual === 'capturado' ? 'pendiente' : 'capturado';
  saveData();
  // Update cell visually without full re-render
  const span = el.querySelector('span');
  const esCap = appData.estados[cuentaId][mesKey] === 'capturado';
  span.style.cssText = `display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:11px;font-weight:600;${esCap?'background:var(--green-bg);color:var(--green)':'background:var(--red-bg);color:var(--red)'}`;
  span.textContent = esCap ? '✓' : '○';
  // Update count cells in same row
  const row = el.closest('tr');
  const cells = [...row.querySelectorAll('td')].slice(2, 14);
  let cap = 0, pend = 0;
  cells.forEach(td => {
    const s = td.querySelector('span');
    if (s && s.textContent === '✓') cap++;
    if (s && s.textContent === '○') pend++;
  });
  const tds = row.querySelectorAll('td');
  tds[tds.length-2].textContent = cap;
  tds[tds.length-1].textContent = pend > 0 ? pend : '—';
  tds[tds.length-1].style.color = pend > 0 ? 'var(--red)' : 'var(--text3)';
}

function renderHistorialEC() {
  const hist = appData.historialEC || [];
  if (!hist.length) return `<div class="empty-state">Ningún archivo subido aún</div>`;
  return hist.slice().reverse().map(h => `
    <div style="display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--border)">
      <div style="width:34px;height:34px;border-radius:8px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">
        ${h.tipo==='pdf'?'📄':'📊'}
      </div>
      <div style="flex:1;min-width:0">

}

function handleECDrop(e) {
  e.preventDefault();
  document.getElementById('ec-drop-zone').style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file) processECFile(file);
}

function handleECFile(e) {
  const file = e.target.files[0];
  if (file) processECFile(file);
}

function processECFile(file) {
  const cuenta = document.getElementById('ec-cuenta').value;
  const periodo = document.getElementById('ec-periodo').value;
  const preview = document.getElementById('ec-preview');

  if (!cuenta) { preview.innerHTML = `<div class="alert alert-warn">⚠ Selecciona la cuenta antes de subir el archivo.</div>`; return; }
  if (!periodo) { preview.innerHTML = `<div class="alert alert-warn">⚠ Indica el período del estado de cuenta.</div>`; return; }

  const ext = file.name.split('.').pop().toLowerCase();
  preview.innerHTML = `<div class="alert alert-info">⟳ Leyendo ${file.name}...</div>`;

  if (ext === 'pdf') {
    parsePDF(file, cuenta, periodo);
  } else {
    const reader = new FileReader();
    reader.onload = e => parseCSVText(e.target.result, file.name, cuenta, periodo);
    reader.readAsText(file);
  }
}

// ---- PDF PARSER ----
function parsePDF(file, cuenta, periodo) {
  const preview = document.getElementById('ec-preview');

  // Mostrar spinner mientras procesa
  preview.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;padding:16px;color:var(--text3)">
      <div style="width:20px;height:20px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite"></div>
      <span>Leyendo PDF... puede tardar unos segundos</span>
    </div>`;

  // Si PDF.js ya está listo (precargado desde el head), úsalo de inmediato
  if (window.pdfjsLib) {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = '';
    // Pequeño setTimeout para que el spinner aparezca antes del bloqueo del hilo
    setTimeout(() => readPDFFile(file, cuenta, periodo), 50);
    return;
  }

  // Fallback: cargar dinámicamente si por algún motivo no está en head
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
  script.onload = () => {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = '';
    setTimeout(() => readPDFFile(file, cuenta, periodo), 50);
  };
  script.onerror = () => {
    preview.innerHTML = `
      <div class="alert alert-warn">
        ⚠ No se pudo cargar el lector de PDF (sin conexión a internet).<br>
        <span style="font-size:11px">Usa el CSV del banco como alternativa.</span>
      </div>`;
  };
  document.head.appendChild(script);
}

async function readPDFFile(file, cuenta, periodo) {
  const preview = document.getElementById('ec-preview');
  try {
    const arrayBuffer = await file.arrayBuffer();

    // disableWorker: true es la clave para file:// — evita el intento de cargar worker
    const loadingTask = window.pdfjsLib.getDocument({
      data: arrayBuffer,
      disableWorker: true,
      disableRange: true,
      disableStream: true
    });

    const pdf = await loadingTask.promise;
    let fullText = '';

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const lines = [];
      let lastY = null;
      content.items.forEach(item => {
        if (lastY !== null && Math.abs(item.transform[5] - lastY) > 3) lines.push('\n');
        lines.push(item.str);
        lastY = item.transform[5];
      });
      fullText += lines.join(' ') + '\n---PAGE---\n';
    }

    const rows = detectAndParse(fullText, cuenta, periodo);

    if (rows.length === 0) {
      preview.innerHTML = `
        <div class="alert alert-warn" style="margin-bottom:10px">
          ⚠ Se leyó el PDF pero no se encontraron movimientos con el parser automático.<br>
          <span style="font-size:11px">Banco detectado: ${detectBank(fullText)}. Puedes marcarlo como capturado manualmente.</span>
        </div>
        <button class="btn btn-accent" onclick="confirmECUpload('${file.name}','${cuenta}','${periodo}',0,'pdf')">✓ Marcar como capturado</button>`;
      return;
    }

    showECPreview(rows, file.name, cuenta, periodo);

  } catch(err) {
    // Si falla por el worker aun con disableWorker, mostrar opción CSV
    preview.innerHTML = `
      <div class="alert alert-warn" style="margin-bottom:10px">
        ⚠ Error al leer el PDF: <code style="font-size:11px">${err.message}</code><br>
        <span style="font-size:11px;margin-top:4px;display:block">
          💡 <strong>Alternativa:</strong> descarga el CSV del banco (BBVA/Banamex → Movimientos → Exportar) 
          y súbelo aquí — funciona perfecto sin servidor.
        </span>
      </div>
      <button class="btn" onclick="confirmECUpload('${file.name}','${cuenta}','${periodo}',0,'pdf')">✓ Marcar capturado manualmente</button>`;
  }
}

function detectBank(text) {
  if (/BBVA|BANCOMER/i.test(text)) return 'BBVA';
  if (/BANAMEX|CITIBANAMEX|Cuenta Priority/i.test(text)) return 'Banamex';
  if (/SANTANDER/i.test(text)) return 'Santander';
  if (/HSBC/i.test(text)) return 'HSBC';
  if (/SCOTIABANK/i.test(text)) return 'Scotiabank';
  return 'Desconocido';
}

function detectAndParse(text, cuenta, periodo) {
  const bank = detectBank(text);
  if (bank === 'BBVA') return parseBBVA(text, cuenta, periodo);
  if (bank === 'Banamex') return parseBanamex(text, cuenta, periodo);
  return parseGeneric(text, cuenta, periodo);
}

// ---- BBVA TC / Débito Parser ----
function parseBBVA(text, cuenta, periodo) {
  const rows = [];
  const isTc = /TARJETA.*CREDITO|TARJETA INFINITE|PLATINUM/i.test(text);

  if (isTc) {
    // BBVA TC: parse "CARGOS,COMPRAS Y ABONOS REGULARES" section
    // Format: DD-MMM-YYYY DD-MMM-YYYY CONCEPTO + MONTO
    const mesesMap = {ENE:'01',FEB:'02',MAR:'03',ABR:'04',MAY:'05',JUN:'06',JUL:'07',AGO:'08',SEP:'09',OCT:'10',NOV:'11',DIC:'12'};
    // Extract all lines, look for date patterns
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    let inSection = false;
    let currentConcepto = [];
    let currentDate = null;

    const dateRe = /^(\d{2})[-\s](ENE|FEB|MAR|ABR|MAY|JUN|JUL|AGO|SEP|OCT|NOV|DIC)[-\s](\d{4})/i;
    const montoRe = /([+\-]?\s*\$?\s*[\d,]+\.\d{2})\s*$/;
    const yearMatch = text.match(/(\d{4})/);
    const year = yearMatch ? yearMatch[1] : '2026';

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      if (/CARGOS.*COMPRAS.*ABONOS|DESGLOSE DE MOVIMIENTOS/i.test(line)) { inSection = true; continue; }
      if (/NOTAS ACLARATORIAS|GLOSARIO|PROGRAMA DE BENEFICIOS|SALDO SOBRE EL QUE/i.test(line)) { inSection = false; }
      if (!inSection) continue;

      const dateMatch = line.match(dateRe);
      if (dateMatch) {
        // Save previous
        if (currentDate && currentConcepto.length) {
          const full = currentConcepto.join(' ');
          const mMatch = full.match(/([+\-]?\s*[\d,]+\.\d{2})\s*$/);
          if (mMatch) {
            const montoRaw = mMatch[1].replace(/[\s,]/g,'');
            const monto = parseFloat(montoRaw);
            const concepto = full.replace(mMatch[0],'').trim();
            if (!isNaN(monto) && Math.abs(monto) > 0) {
              const tipo = monto < 0 ? 'DEPOSITO' : 'RETIRO';
              rows.push(buildRow(currentDate, cuenta, concepto, tipo, Math.abs(monto)));
            }
          }
        }
        const mon = mesesMap[(dateMatch[2]||'').toUpperCase()] || '01';
        currentDate = `${dateMatch[3]}-${mon}-${dateMatch[1].padStart(2,'0')}`;
        currentConcepto = [line.replace(dateRe,'').trim()];
      } else if (currentDate) {
        currentConcepto.push(line);
      }
    }
  } else {
    // BBVA Débito: look for date + concepto + retiro/deposito pattern
    return parseGeneric(text, cuenta, periodo);
  }
  return rows;
}

// ---- Banamex Priority Parser ----
function parseBanamex(text, cuenta, periodo) {
  const rows = [];
  const mesesMap = {ENE:'01',FEB:'02',MAR:'03',ABR:'04',MAY:'05',JUN:'06',JUL:'07',AGO:'08',SEP:'09',OCT:'10',NOV:'11',DIC:'12'};
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  let inDetalle = false;
  let currentDate = null;
  let currentConcepto = [];
  let lastMonto = null;

  // Date pattern: "03 FEB" or "03 FEB 2026"
  const dateRe = /^(\d{2})\s+(ENE|FEB|MAR|ABR|MAY|JUN|JUL|AGO|SEP|OCT|NOV|DIC)/i;
  const montoRe = /^[\d,]+\.\d{2}$/;
  const yearMatch = periodo ? periodo.substring(0,4) : '2026';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (/Detalle de Operaciones|DETALLE DE OPERACIONES/i.test(line)) { inDetalle = true; continue; }
    if (/GLOSARIO|Este documento es|Cadena Original|Sello Digital|Comparador/i.test(line)) { inDetalle = false; }
    if (!inDetalle) continue;

    // Skip header row
    if (/^FECHA\s+CONCEPTO/i.test(line) || /^RETIROS\s+DEPÓSITOS/i.test(line)) continue;
    if (/SALDO ANTERIOR/i.test(line)) continue;

    const dateMatch = line.match(dateRe);
    if (dateMatch) {
      // Flush previous
      if (currentDate && currentConcepto.length) {
        flushBanamexRow(rows, currentDate, cuenta, currentConcepto, yearMatch);
      }
      const mon = mesesMap[(dateMatch[2]||'').toUpperCase()] || '01';
      currentDate = `${yearMatch}-${mon}-${dateMatch[1].padStart(2,'0')}`;
      currentConcepto = [line.replace(dateRe,'').trim()];
    } else if (currentDate) {
      currentConcepto.push(line);
    }
  }
  // Flush last
  if (currentDate && currentConcepto.length) {
    flushBanamexRow(rows, currentDate, cuenta, currentConcepto, yearMatch);
  }
  return rows;
}

function flushBanamexRow(rows, date, cuenta, lines, year) {
  const full = lines.join(' ').trim();
  // Look for money amounts: numbers like 1,234.56 or 12,054.94
  const montoRe = /\b([\d,]+\.\d{2})\b/g;
  const amounts = [...full.matchAll(montoRe)].map(m => parseFloat(m[1].replace(/,/g,'')));
  if (!amounts.length) return;

  // Last amount is usually saldo, second-to-last (if exists) is retiro/deposito
  // Heuristic: if line has 2 amounts, first is transaction, second is running balance
  const concepto = full.replace(/\b[\d,]+\.\d{2}\b/g,'').replace(/\s+/g,' ').trim();
  if (amounts.length >= 2) {
    const monto = amounts[amounts.length - 2];
    if (monto <= 0 || monto > 500000) return;
    // Determine tipo: look for keywords
    const tipo = /PAGO INTERBANCARIO A|RETIRO|CARGO|COMPRA/i.test(concepto) ? 'RETIRO' : 'DEPOSITO';
    const grupoInfo = autoClasificar(concepto, tipo, cuenta);
    rows.push({
      id: appData.nextId++,
      fecha: date,
      banco: cuenta,
      concepto: concepto.substring(0, 100),
      tipo,
      monto,
      subgrupo: grupoInfo.subgrupo,
      grupo: grupoInfo.grupo
    });
  }
}

// ---- Generic Parser (fallback) ----
function parseGeneric(text, cuenta, periodo) {
  const rows = [];
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const dateRe = /(\d{2})[\/\-](\d{2})[\/\-](\d{4})|(\d{4})[\/\-](\d{2})[\/\-](\d{2})/;
  const montoRe = /\$?\s*([\d,]+\.\d{2})/g;

  for (const line of lines) {
    const dateMatch = line.match(dateRe);
    if (!dateMatch) continue;
    const amounts = [...line.matchAll(montoRe)].map(m => parseFloat(m[1].replace(/,/g,'')));
    if (!amounts.length) continue;
    const monto = amounts[0];
    if (monto <= 0 || monto > 999999) continue;
    const concepto = line.replace(dateRe,'').replace(/\$?\s*[\d,]+\.\d{2}/g,'').replace(/\s+/g,' ').trim();
    if (concepto.length < 3) continue;
    const tipo = /PAGO A|CARGO|COMPRA|RETIRO/i.test(line) ? 'RETIRO' : 'DEPOSITO';
    const grupoInfo = autoClasificar(concepto, tipo, cuenta);
    rows.push({
      id: appData.nextId++,
      fecha: dateMatch[3] ? `${dateMatch[3]}-${dateMatch[2]}-${dateMatch[1]}` : `${dateMatch[4]}-${dateMatch[5]}-${dateMatch[6]}`,
      banco: cuenta,
      concepto: concepto.substring(0,100),
      tipo,
      monto,
      subgrupo: grupoInfo.subgrupo,
      grupo: grupoInfo.grupo
    });
  }
  return rows;
}

function buildRow(fecha, banco, concepto, tipo, monto) {
  const grupoInfo = autoClasificar(concepto, tipo, banco);
  return { id: appData.nextId++, fecha, banco, concepto: concepto.substring(0,120), tipo, monto, subgrupo: grupoInfo.subgrupo, grupo: grupoInfo.grupo };
}

// ---- CSV Parser ----
function parseCSVText(text, nombre, cuenta, periodo) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) { showECPreview([], nombre, cuenta, periodo); return; }
  const sep = lines[0].includes(';') ? ';' : ',';
  const rawH = lines[0].split(sep).map(h => h.trim().replace(/"/g,'').toUpperCase());
  const fi = (cands) => { for (const c of cands) { const i = rawH.findIndex(h=>h.includes(c)); if(i>=0) return i; } return -1; };
  const idxFecha = fi(['FECHA','DATE']);
  const idxDesc  = fi(['DESCRIPCION','CONCEPTO','DESCRIPTION','DETALLE','MOVIMIENTO']);
  const idxCargo = fi(['CARGO','DEBITO','RETIRO','DEBIT']);
  const idxAbono = fi(['ABONO','CREDITO','DEPOSITO','CREDIT']);
  const idxMonto = fi(['MONTO','IMPORTE','AMOUNT']);
  const rows = [];
  const toNum = s => parseFloat((s||'').replace(/[,$\s]/g,'').replace(/,/g,'.')) || 0;
  for (let i = 1; i < lines.length; i++) {
    const cols = []; let inQ=false, cur='';
    for (const ch of lines[i]) {
      if (ch==='"') inQ=!inQ;
      else if (ch===sep && !inQ) { cols.push(cur.trim()); cur=''; }
      else cur+=ch;
    }
    cols.push(cur.trim());
    if (cols.length < 2) continue;
    const get = idx => idx>=0 && idx<cols.length ? cols[idx].replace(/"/g,'').trim() : '';
    let monto=0, tipo='RETIRO';
    if (idxCargo>=0 || idxAbono>=0) {
      const cargo=toNum(get(idxCargo)), abono=toNum(get(idxAbono));
      if (cargo>0) { monto=cargo; tipo='RETIRO'; }
      else if (abono>0) { monto=abono; tipo='DEPOSITO'; }
      else continue;
    } else if (idxMonto>=0) {
      const num=toNum(get(idxMonto)); if(num===0) continue;
      monto=Math.abs(num); tipo=num<0?'RETIRO':'DEPOSITO';
    } else continue;
    let fecha=get(idxFecha);
    const dm=fecha.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
    if(dm) fecha=dm[3]+'-'+dm[2].padStart(2,'0')+'-'+dm[1].padStart(2,'0');
    const concepto=get(idxDesc)||'Movimiento '+i;
    const cls=autoClasificar(concepto);
    rows.push({ id:appData.nextId++, fecha, banco:cuenta, concepto, tipo, monto, subgrupo:cls.subgrupo, grupo:cls.grupo });
  }
  if (rows.length===0) {
    document.getElementById('ec-preview').innerHTML = '<div class="alert alert-warn">⚠ No se encontraron movimientos.<br><span style="font-size:11px">Columnas detectadas: '+rawH.join(', ')+'</span></div>';
    return;
  }
  showECPreview(rows, nombre, cuenta, periodo);
}

function confirmECImport(rows, archivo, cuenta, periodo) {
  const existingIds = new Set(appData.movimientos.map(m => m.id));
  const nuevos = rows.filter(r => !existingIds.has(r.id));
  appData.movimientos = [...appData.movimientos, ...nuevos];
  registerECUpload(archivo, cuenta, periodo, nuevos.length, 'csv');
  document.getElementById('ec-preview').innerHTML = `
    <div class="alert alert-info">✓ ${nuevos.length} movimientos importados correctamente para ${cuenta} · ${periodo}</div>`;
  document.getElementById('ec-historial-body').innerHTML = renderHistorialEC();
}

function confirmECUpload(archivo, cuenta, periodo, movimientos, tipo) {
  registerECUpload(archivo, cuenta, periodo, movimientos, tipo);
  document.getElementById('ec-preview').innerHTML = `
    <div class="alert alert-info">✓ Estado de cuenta registrado: ${cuenta} · ${periodo}</div>`;
  document.getElementById('ec-historial-body').innerHTML = renderHistorialEC();
}

function registerECUpload(archivo, cuenta, periodo, movimientos, tipo) {
  if (!appData.historialEC) appData.historialEC = [];
  // Marcar como capturado en el control
  if (!appData.estados) appData.estados = {};
  if (!appData.estados[cuenta]) appData.estados[cuenta] = {};
  appData.estados[cuenta][periodo] = 'capturado';
  // Agregar al historial
  const fecha = new Date().toLocaleDateString('es-MX', {day:'2-digit',month:'short',year:'numeric'});
  appData.historialEC.push({ archivo, cuenta, periodo, movimientos, tipo, fecha });
  appData.dataVersion = DATA_VERSION;
  saveData();
  // Refresh control grid cell if visible
  const cell = document.querySelector(`[onclick*="'${cuenta}','${periodo}'"]`);
  if (cell) {
    const span = cell.querySelector('span');
    if (span) {
      span.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:11px;font-weight:600;background:var(--green-bg);color:var(--green)';
      span.textContent = '✓';
    }
  }
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file) processCSV(file);
}

function handleFile(e) {
  const file = e.target.files[0];
  if (file) processCSV(file);
}

function processCSV(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.trim().split('\n');
    const sep = lines[0].includes(';') ? ';' : ',';
    const headers = lines[0].split(sep).map(h=>h.trim().replace(/"/g,'').toUpperCase());
    const fi = h => headers.indexOf(h);
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(sep).map(c=>c.trim().replace(/"/g,''));
      if (cols.length < 3) continue;
      const monto = parseFloat((cols[fi('MONTO')]||'0').replace(',','.'));
      if (isNaN(monto) || monto === 0) continue;
      rows.push({
        id: appData.nextId++,
        fecha: cols[fi('FECHA')] || '',
        banco: cols[fi('BANCO')] || '',
        concepto: cols[fi('CONCEPTO')] || cols[fi('DESCRIPCION')] || '',
        tipo: (cols[fi('TIPO')]||'RETIRO').toUpperCase(),
        monto: Math.abs(monto),
        subgrupo: cols[fi('SUBGRUPO')] || 'Sin clasificar',
        grupo: cols[fi('GRUPO')] || 'Sin clasificar'
      });
    }
    document.getElementById('import-preview').innerHTML = `
      <div class="alert alert-info">✓ ${rows.length} registros encontrados</div>
      <button class="btn btn-accent" onclick="confirmImport(${JSON.stringify(rows).replace(/</g,'&lt;')})">Importar ${rows.length} movimientos</button>`;
  };
  reader.readAsText(file);
}

function confirmImport(rows) {
  appData.movimientos = [...rows, ...appData.movimientos];
  saveData();
  document.getElementById('import-preview').innerHTML = `<div class="alert alert-info">✓ ${rows.length} movimientos importados correctamente</div>`;
}

function exportCSV() {
  const headers = ['FECHA','BANCO','CONCEPTO','TIPO','MONTO','SUBGRUPO','GRUPO'];
  const rows = appData.movimientos.map(m => [m.fecha,m.banco,m.concepto,m.tipo,m.monto,m.subgrupo,m.grupo].map(v=>`"${v}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'finanzas_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
}

function resetData() {
  appData = { movimientos: getInitialData(), pasivos: getInitialPasivos(), nextId: 10000 };
  saveData();
  renderPage();
}

    <!-- SECCIÓN 2: Con Intereses -->
    <div style="padding:8px 16px 4px;background:var(--bg2);border-top:2px solid var(--bg4);border-bottom:1px solid var(--bg4)">
      <span style="font-size:11px;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:.5px">⚠️ Con Intereses (EFI / Diferimientos)</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:12px">${rowsCI.length} planes · ${fmt(totalCIPago)}/mes · ${fmt(totalCISaldo)} saldo</span>
    </div>
    <div class="table-wrap">
      <table class="tc-table">
        ${thead}
        <tbody>
          ${renderRows(rowsCI, true)}
          <tr class="tc-total-row">
            <td colspan="5">Subtotal Con Intereses (${rowsCI.length})</td>
            <td style="color:var(--amber)">${fmt(totalCIPago)}</td>
            <td style="color:var(--red)">${fmt(totalCISaldo)}</td>
          </tr>
          <tr class="tc-total-row" style="background:var(--bg3)">
            <td colspan="5"><strong>TOTAL GENERAL (${rowsSI.length + rowsCI.length} planes)</strong></td>
            <td style="color:var(--amber);font-weight:700">${fmt(totalPago)}</td>
            <td style="color:var(--red);font-weight:700">${fmt(totalSaldo)}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

// ==================== BANCOS CARD ====================
function renderBancosCard() {
  const bancos = getBancos();
  const totalBancos = bancos.reduce((s,b) => s + (b.saldo||0), 0);
  const rows = bancos.map(b => {
    const pct = totalBancos > 0 ? Math.round((b.saldo / totalBancos) * 100) : 0;
    const barColor = b.saldo > 50000 ? 'var(--green)' : b.saldo > 10000 ? 'var(--amber)' : 'var(--text3)';
    return `
    <div style="display:flex;align-items:center;gap:16px;padding:14px 18px;border-bottom:1px solid var(--border);">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--accent2);flex-shrink:0">
        ${b.nombre.substring(0,2).toUpperCase()}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:500;font-size:13px">${b.nombre}</div>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px">${b.titular} · ${b.clabe}</div>
        <div style="height:3px;background:var(--bg4);border-radius:2px;margin-top:6px;width:100%">
          <div style="height:3px;border-radius:2px;background:${barColor};width:${Math.max(pct,2)}%"></div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:var(--mono);font-size:16px;font-weight:600;color:var(--green)">${fmt(b.saldo)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${pct}% del total</div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="card" style="margin-bottom:16px">
    <div class="card-header">
      <span class="card-title">🏦 Bancos</span>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-family:var(--mono);font-size:13px;color:var(--green);font-weight:600">${fmt(totalBancos)}</span>
        <button class="btn" onclick="openEditBancos()" style="font-size:12px">✏ Actualizar</button>
      </div>
    </div>
    ${rows}
  </div>`;
}

function openEditBancos() {
  const bancos = getBancos();
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">Actualizar saldos bancarios</div>
    ${bancos.map((b,i) => `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="width:32px;height:32px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent2);flex-shrink:0">${b.nombre.substring(0,2)}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500;margin-bottom:6px">${b.nombre} <span style="color:var(--text3);font-size:11px">${b.titular}</span></div>
          <input class="form-control" id="banco-saldo-${i}" type="number" value="${b.saldo}" step="0.01" placeholder="Saldo actual" style="width:100%">
        </div>
      </div>`).join('')}
    <div style="margin-top:20px;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-accent" onclick="saveBancos(${bancos.length})">Guardar</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function saveBancos(count) {
  const bancos = getBancos().map((b,i) => ({
    ...b,
    saldo: parseFloat(document.getElementById(`banco-saldo-${i}`).value) || 0
  }));
  appData.bancos = bancos;
  saveData();
  closeModal();
  renderPage();
}

// ==================== EDIT TC ====================
function openEditTC() {
  const tcs = appData.tc && appData.tc.length ? appData.tc : TC_DATA;
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">Actualizar saldos de tarjetas</div>
    <div style="max-height:60vh;overflow-y:auto">
    ${tcs.map((tc,i) => `
      <div style="padding:12px 0;border-bottom:1px solid var(--border)">
        <div style="font-weight:500;margin-bottom:8px">${tc.nombre}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div class="form-group"><label>Disponible</label><input class="form-control" id="tc-disp-${i}" type="number" value="${tc.disponible}" step="0.01"></div>
          <div class="form-group"><label>Saldo deudor</label><input class="form-control" id="tc-saldo-${i}" type="number" value="${tc.saldo}" step="0.01"></div>
          <div class="form-group"><label>Pago período</label><input class="form-control" id="tc-pago-${i}" type="number" value="${tc.pago_periodo||''}" step="0.01" placeholder="—"></div>
          <div class="form-group"><label>Sin intereses</label><input class="form-control" id="tc-sint-${i}" type="number" value="${tc.sin_intereses||tc.saldo}" step="0.01"></div>
        </div>
      </div>`).join('')}
    </div>
    <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-accent" onclick="saveTC(${tcs.length})">Guardar</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function saveTC(count) {
  const tcs = appData.tc && appData.tc.length ? [...appData.tc] : [...TC_DATA];
  for (let i = 0; i < count; i++) {
    tcs[i] = {
      ...tcs[i],
      disponible: parseFloat(document.getElementById(`tc-disp-${i}`).value)||0,
      saldo: parseFloat(document.getElementById(`tc-saldo-${i}`).value)||0,
      pago_periodo: parseFloat(document.getElementById(`tc-pago-${i}`).value)||null,
      sin_intereses: parseFloat(document.getElementById(`tc-sint-${i}`).value)||0,
    };
  }
  appData.tc = tcs;
  saveData();
  closeModal();
  renderPage();
}

// ==================== MODAL ====================
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ==================== MISC ====================
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ==================== INIT ====================
saveData();
showPage('dashboard');
</script>
</body>
</html>
